version: '3.9'
services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_started
    networks:
      - my_network
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./server/media:/app/server/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - my_network
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=twitter_db
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USER=admin
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d twitter_db -U admin"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    ports:
      - "5432:5432"
    networks:
      - my_network
    volumes:
      - ./db/:/var/lib/postgresql/data

networks:
  my_network:
    driver: bridge
